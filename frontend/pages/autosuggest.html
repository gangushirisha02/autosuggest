<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="autosuggest.css">
    <title>Document</title>
</head>
<body>
    <!-- <p id="upper text">&#9881; &#9679;online|&#128337; -ms</p> -->
     <div id="upper">
         <span >&#9881;</span>
         <span >&#9679;online|&#128337; -ms</span>
    </div>
    
     <!--span is used to continue text or elements print in same line unlike div used to break the lines-->
     <div id="searchbar">
    <h1 >
        <span class="Shee">Shee</span>Gan
    </h1>
    <p id="p1">One million phrases.Four algorithms.Prefix Based Auto Suggest</p>
        <p id="p2"><span class="lense">&#128269;</span> <input type="text" id="search" placeholder="      Start Typing to search phrases"></p>
    </div>
    <div id="suggestion-box">   

    </div>
    <script>
        var searchBox = document.getElementById("search");
        var suggestionBox = document.getElementById("suggestion-box");
        searchBox.addEventListener("input", function() {
            //1.get user type text
            //2.make api call to get suggestions
            //3.display results in html

            var searchTerm = searchBox.value.trim();
            if (searchTerm.length > 0) {
                var url1="https://autosuggest-backend.onrender.com/api/autosuggest?q=";
                var url2= "&algorithm=brute&limit=10&weighted=false";
                var fullUrl=url1+searchTerm+url2;
                fetch(fullUrl)
                    .then(function(response) {
                        return response.json();
                    })
                    .then(function(data){
                        console.log(data);
                        var resultArray = data.results;
                        var htmlResults = "";
                        for (var i = 0; i < resultArray.length; i++) {
                            htmlResults += "<div id='suggestion-items'>"+resultArray[i].text+"</div>";
                        }
                        //  var suggestionBox = document.getElementById("suggestion-box");
                        suggestionBox.innerHTML = htmlResults;
                    })

            } else {
                clearSuggestions();
            }
        });
        
    </script>
</body>
</html>
